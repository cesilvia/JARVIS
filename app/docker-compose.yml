services:
  jarvis:
    build: .
    container_name: jarvis
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - jarvis-data:/app/data
      - ./backups:/backups
    env_file:
      - .env.local
    environment:
      - BACKUP_DIR=/backups

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=America/Los_Angeles
      - N8N_SECURE_COOKIE=false

  lightrag:
    image: lightrag/lightrag:latest
    container_name: lightrag
    restart: unless-stopped
    ports:
      - "9621:9621"
    volumes:
      - lightrag-data:/app/data
    environment:
      - LLM_MODEL=google/gemini-2.5-flash
      - LLM_BINDING=openai
      - LLM_BINDING_HOST=https://openrouter.ai/api/v1
      - LLM_BINDING_API_KEY=${OPENROUTER_API_KEY}
      - EMBEDDING_MODEL=openai/text-embedding-3-small
      - EMBEDDING_BINDING=openai
      - EMBEDDING_BINDING_HOST=https://openrouter.ai/api/v1
      - EMBEDDING_BINDING_API_KEY=${OPENROUTER_API_KEY}
      - EMBEDDING_DIM=1536
      - MAX_TOKENS=8192
      - LIGHTRAG_HOST=0.0.0.0
      - LIGHTRAG_PORT=9621
      - INPUT_DIR=/app/data/inputs
      - WORKING_DIR=/app/data/working

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - jarvis

volumes:
  jarvis-data:
  n8n-data:
  lightrag-data:
