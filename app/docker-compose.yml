services:
  jarvis:
    build: .
    container_name: jarvis
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - jarvis-data:/app/data
      - ${BACKUP_HOST_DIR:-~/Library/Mobile Documents/com~apple~CloudDocs/JARVIS-backups}:/backups
    env_file:
      - .env.local
    environment:
      - BACKUP_DIR=/backups

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=America/Los_Angeles
      - N8N_SECURE_COOKIE=false

volumes:
  jarvis-data:
  n8n-data:
