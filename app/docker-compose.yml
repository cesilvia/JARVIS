services:
  jarvis:
    build: .
    container_name: jarvis
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    expose:
      - "3000"
    volumes:
      - jarvis-data:/app/data
      - ./backups:/backups
    env_file:
      - .env.local
    environment:
      - BACKUP_DIR=/backups

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=America/Los_Angeles
      - N8N_SECURE_COOKIE=false

  lightrag:
    image: ghcr.io/hkuds/lightrag@sha256:e147e37f0f4d0d5cfddd8fe00a3fd4da53a82523d044054b73a66346ccfbaf89
    container_name: lightrag
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "9621:9621"
    volumes:
      - lightrag-data:/app/data/rag_storage
      - lightrag-inputs:/app/data/inputs
      - ./lightrag.env:/app/.env:ro
    environment:
      - WORKING_DIR=/app/data/rag_storage
      - INPUT_DIR=/app/data/inputs

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - jarvis

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * 0
      - WATCHTOWER_INCLUDE_STOPPED=false
      - TZ=America/Los_Angeles
      - DOCKER_API_VERSION=1.45
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  jarvis-data:
  n8n-data:
  lightrag-data:
  lightrag-inputs:
